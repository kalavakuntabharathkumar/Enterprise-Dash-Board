kind = "web"
previewPath = "/"
title = "Enterprise OS"
version = "1.0.0"
id = "artifacts/enterprise-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22209

[services.development]
run = "pnpm --filter @workspace/enterprise-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/enterprise-os", "run", "build" ]
publicDir = "artifacts/enterprise-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22209"
BASE_PATH = "/"
